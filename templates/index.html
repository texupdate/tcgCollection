<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Collection - Visualização de Livro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='book.css') }}">
</head>
<body>
    <div class="header">
        <h1>🃏 Minha Coleção TCG</h1>
        <div class="controls">
            <select id="collectionSelect" onchange="changeCollection()">
                <option value="">Selecione uma coleção...</option>
            </select>
            <a href="/manage" class="btn btn-manage">⚙️ Gerenciar Coleção</a>
        </div>
        <div class="filter-controls">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">📋 Todas</button>
            <button class="filter-btn" data-filter="original" onclick="setFilter('original')">✨ Originais</button>
            <button class="filter-btn" data-filter="orica" onclick="setFilter('orica')">🎨 Oricas</button>
        </div>
    </div>

    <div class="book-container" id="bookContainer">
        <div class="book">
            <!-- Página Esquerda (cartas 1-9) -->
            <div class="page left-page">
                <div class="page-header">
                    <span class="page-number" id="leftPageNumber">Página 1</span>
                </div>
                <div class="cards-grid">
                    <div class="card-slot" data-slot="1"></div>
                    <div class="card-slot" data-slot="2"></div>
                    <div class="card-slot" data-slot="3"></div>
                    <div class="card-slot" data-slot="4"></div>
                    <div class="card-slot" data-slot="5"></div>
                    <div class="card-slot" data-slot="6"></div>
                    <div class="card-slot" data-slot="7"></div>
                    <div class="card-slot" data-slot="8"></div>
                    <div class="card-slot" data-slot="9"></div>
                </div>
            </div>

            <!-- Divisor do Livro -->
            <div class="book-spine"></div>

            <!-- Página Direita (cartas 10-18) -->
            <div class="page right-page">
                <div class="page-header">
                    <span class="page-number" id="rightPageNumber">Página 2</span>
                </div>
                <div class="cards-grid">
                    <div class="card-slot" data-slot="10"></div>
                    <div class="card-slot" data-slot="11"></div>
                    <div class="card-slot" data-slot="12"></div>
                    <div class="card-slot" data-slot="13"></div>
                    <div class="card-slot" data-slot="14"></div>
                    <div class="card-slot" data-slot="15"></div>
                    <div class="card-slot" data-slot="16"></div>
                    <div class="card-slot" data-slot="17"></div>
                    <div class="card-slot" data-slot="18"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="navigation">
        <button id="prevBtn" onclick="previousPage()" class="nav-btn">⬅️ Página Anterior</button>
        <span class="page-info" id="pageInfo">Cartas 1-18 de 0</span>
        <button id="nextBtn" onclick="nextPage()" class="nav-btn">Próxima Página ➡️</button>
    </div>

    <div class="empty-state" id="emptyState" style="display: none;">
        <h2>📚 Nenhuma coleção selecionada</h2>
        <p>Selecione uma coleção acima ou <a href="/manage">crie uma nova coleção</a> para começar!</p>
    </div>

    <script src="{{ url_for('static', filename='book.js') }}"></script>
</body>
</html>
