<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TCG Collection Manager - Início</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('/static/yugioh-bg.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
        }

        .container {
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .header {
            color: white;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 20px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.8);
        }

        .header p {
            font-size: 1.3em;
            opacity: 0.9;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .menu-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .menu-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            padding: 40px 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            text-decoration: none;
            color: white;
            display: block;
        }

        .menu-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .menu-card.collections {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .menu-card.cards {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .menu-card .icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .menu-card .card-back-icon {
            width: 120px;
            height: 168px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-card .card-back-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .menu-card h2 {
            font-size: 2em;
            margin-bottom: 15px;
        }

        .menu-card p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .book-viewer-link {
            margin-top: 40px;
        }

        .book-viewer-link a {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.2em;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .book-viewer-link a:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎴 TCG Collection Manager</h1>
            <p>Gerencie sua coleção de cartas de forma profissional</p>
        </div>

        <div class="menu-cards">
            <a href="/manage_collections" class="menu-card collections">
                <div class="icon">📁</div>
                <h2>Gerenciar Pastas</h2>
                <p>Criar e organizar coleções</p>
            </a>

            <a href="/manage_cards" class="menu-card cards">
                <div class="icon card-back-icon">
                    <img src="/static/yugioh-card-back.jpg" alt="Gerenciar Cartas">
                </div>
                <h2>Gerenciar Cartas</h2>
                <p>Adicionar e editar cartas</p>
            </a>
        </div>

        <div class="book-viewer-link">
            <a href="/viewer">📖 Visualizar Álbum de Cartas</a>
        </div>
    </div>
</body>
</html>
